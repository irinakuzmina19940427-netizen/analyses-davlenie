];
const BP_ZONES=[
  {label:"Норма",color:"#10b981"},
  {label:"Повышенное",color:"#f59e0b"},
  {label:"Гипертония I",color:"#f97316"},
  {label:"Гипертония II",color:"#ef4444"},
  {label:"Криз",color:"#7c3aed"},
];
function getZone(s,d){
  if(s>=180||d>=120)return BP_ZONES[4];
  if(s>=140||d>=90)return BP_ZONES[3];
  if(s>=130||d>=80)return BP_ZONES[2];
  if(s>=120)return BP_ZONES[1];
  return BP_ZONES[0];
}
function getColor(s,d){return getZone(s,d).color;}

const initState={users:[{id:"u1",name:"Я",color:"#6366f1"}],activeUser:"u1",records:[]};

function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{}}

// ── SVG Chart ──────────────────────────────────────────────────────────────
function BpChart({records}){
  if(records.length<2)return h("div",{style:{color:"#94a3b8",textAlign:"center",padding:"32px 0",fontSize:13}},"Добавьте хотя бы 2 измерения");
  const W=340,H=160,PL=36,PR=8,PT=8,PB=24;
  const cW=W-PL-PR,cH=H-PT-PB;
  const vals=[...records.map(r=>r.sys),...records.map(r=>r.dia)];
  const minV=Math.max(40,Math.min(...vals)-10);
  const maxV=Math.min(220,Math.max(...vals)+10);
  const xStep=cW/(records.length-1);
  function fy(v){return PT+cH-(v-minV)/(maxV-minV)*cH;}
  function fx(i){return PL+i*xStep;}
  const sysPath=records.map((r,i)=>(i===0?"M":"L")+fx(i)+","+fy(r.sys)).join(" ");
  const diaPath=records.map((r,i)=>(i===0?"M":"L")+fx(i)+","+fy(r.dia)).join(" ");
  // Y axis labels
  const yLabels=[];
  for(let v=Math.ceil(minV/20)*20;v<=maxV;v+=20){
    yLabels.push(h("text",{key:v,x:PL-4,y:fy(v)+4,textAnchor:"end",fontSize:9,fill:"#94a3b8"},v));
  }
  // X axis labels (show max 5)
  const step=Math.max(1,Math.floor(records.length/5));
  const xLabels=records.filter((_,i)=>i%step===0||i===records.length-1).map((r,_,arr)=>{
    const i=records.indexOf(r);
    const d=new Date(r.date);
    const lbl=d.toLocaleDateString("ru",{day:"numeric",month:"short"});
    return h("text",{key:i,x:fx(i),y:H-4,textAnchor:"middle",fontSize:8,fill:"#94a3b8"},lbl);
  });
  // Dots
  const dots=records.map((r,i)=>h("circle",{key:i,cx:fx(i),cy:fy(r.sys),r:3,fill:getColor(r.sys,r.dia),stroke:"#fff",strokeWidth:1}));

  return h("svg",{width:"100%",viewBox:`0 0 ${W} ${H}`,style:{display:"block"}},
    // grid
    h("line",{x1:PL,y1:fy(120),x2:W-PR,y2:fy(120),stroke:"#10b981",strokeWidth:1,strokeDasharray:"4 3",opacity:0.6}),
    h("line",{x1:PL,y1:fy(140),x2:W-PR,y2:fy(140),stroke:"#ef4444",strokeWidth:1,strokeDasharray:"4 3",opacity:0.6}),
    h("text",{x:W-PR-2,y:fy(120)-3,textAnchor:"end",fontSize:8,fill:"#10b981"},"норма"),
    h("text",{x:W-PR-2,y:fy(140)-3,textAnchor:"end",fontSize:8,fill:"#ef4444"},"↑ гипертония"),
    ...yLabels,
    // lines
    h("path",{d:diaPath,fill:"none",stroke:"#818cf8",strokeWidth:1.5,strokeDasharray:"5 3"}),
    h("path",{d:sysPath,fill:"none",stroke:"#6366f1",strokeWidth:2}),
    ...dots,
    ...xLabels,
  );
}

function PulseChart({records}){
  const recs=records.filter(r=>r.pulse);
  if(recs.length<2)return null;
  const W=340,H=100,PL=36,PR=8,PT=8,PB=20;
  const cW=W-PL-PR,cH=H-PT-PB;
  const vals=recs.map(r=>r.pulse);
  const minV=Math.max(40,Math.min(...vals)-10);
  const maxV=Math.min(160,Math.max(...vals)+10);
  const xStep=cW/(recs.length-1||1);
  function fy(v){return PT+cH-(v-minV)/(maxV-minV)*cH;}
  function fx(i){return PL+i*xStep;}
  const path=recs.map((r,i)=>(i===0?"M":"L")+fx(i)+","+fy(r.pulse)).join(" ");
  return h("svg",{width:"100%",viewBox:`0 0 ${W} ${H}`,style:{display:"block"}},
    h("path",{d:path,fill:"none",stroke:"#ec4899",strokeWidth:2}),
    recs.map((r,i)=>h("circle",{key:i,cx:fx(i),cy:fy(r.pulse),r:3,fill:"#ec4899",stroke:"#fff",strokeWidth:1})),
    recs.filter((_,i)=>i===0||i===recs.length-1).map((r,_,arr)=>{
      const i=recs.indexOf(r);
      return h("text",{key:i,x:fx(i),y:H-4,textAnchor:i===0?"start":"end",fontSize:8,fill:"#94a3b8"},new Date(r.date).toLocaleDateString("ru",{day:"numeric",month:"short"}));
    }),
  );
}

function BarChart2({records}){
  if(!records.length)return null;
  const maxC=Math.max(...records.map(r=>r.cigarettes),1);
  const maxA=Math.max(...records.map(r=>r.alcohol),1);
  const W=340,H=100,PL=8,PR=8,PT=8,PB=20;
  const cW=W-PL-PR;
  const barW=Math.max(4,Math.floor(cW/records.length/2)-2);
  const gap=Math.floor(cW/records.length);
  return h("svg",{width:"100%",viewBox:`0 0 ${W} ${H}`,style:{display:"block"}},
    records.map((r,i)=>{
      const x=PL+i*gap;
      const maxH=H-PT-PB;
      const cH=r.cigarettes?Math.max(2,r.cigarettes/maxC*maxH):0;
      const aH=r.alcohol?Math.max(2,r.alcohol/maxA*maxH):0;
      return h("g",{key:i},
        cH&&h("rect",{x:x,y:H-PB-cH,width:barW,height:cH,fill:"#94a3b8",rx:2}),
        aH&&h("rect",{x:x+barW+1,y:H-PB-aH,width:barW,height:aH,fill:"#c084fc",rx:2}),
      );
    }),
    h("text",{x:PL,y:H-6,fontSize:9,fill:"#94a3b8"},"🚬 серый  🍷 фиолетовый"),
  );
}

  function addRecord(){
    const sys=parseInt(form.sys),dia=parseInt(form.dia),pulse=parseInt(form.pulse);
    if(!sys||!dia||sys<60||sys>260||dia<40||dia>160)return;
    const rec={
      id:Date.now().toString(),userId:data.activeUser,
      date:form.date,time:new Date().toTimeString().slice(0,5),
      timeOfDay:form.timeOfDay,sys,dia,pulse:pulse||null,
      cigarettes:parseInt(form.cigarettes)||0,
      alcohol:parseFloat(form.alcohol)||0,
      stress:parseInt(form.stress)||0,
      meds:form.meds,medsName:form.meds?form.medsName.trim():"",
      notes:form.notes,
    };
    setData(d=>({...d,records:[...d.records,rec]}));
    setSaved(true);setTimeout(()=>setSaved(false),2000);
    setForm(f=>({...f,sys:"",dia:"",pulse:"",notes:"",cigarettes:"0",alcohol:"0",medsName:""}));
  }

  function deleteRecord(id){setData(d=>({...d,records:d.records.filter(r=>r.id!==id)}));}

  function addUser(){
    if(!newUserName.trim())return;
    const colors=["#6366f1","#ec4899","#10b981","#f59e0b","#06b6d4","#8b5cf6"];

    setData(d=>({...d,

      activeUser:id,
    }));

  }

  function saveApiKey(){
    localStorage.setItem(API_KEY_STORAGE,apiKey.trim());
    setApiKeySaved(true);setTimeout(()=>setApiKeySaved(false),2000);
  }

  function exportJSON(){
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    a.download="давление_"+new Date().toISOString().slice(0,10)+".json";
    a.click();URL.revokeObjectURL(url);
  }

  function exportCSV(){
    const rows=[["Дата","Время","Пользователь","Сист.","Диаст.","Пульс","Время суток","Сигареты","Алкоголь","Стресс","Лекарства","Препарат","Заметки"]];
    data.records.forEach(r=>{
      const user=data.users.find(u=>u.id===r.userId)?.name||r.userId;
      const tod=TIME_OF_DAY.find(t=>t.id===r.timeOfDay)?.label||"";
      rows.push([r.date,r.time||"",user,r.sys,r.dia,r.pulse||"",tod,r.cigarettes,r.alcohol,r.stress,r.meds?"Да":"Нет",r.medsName||"",r.notes||""]);
    });
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    a.download="давление_"+new Date().toISOString().slice(0,10)+".csv";
    a.click();URL.revokeObjectURL(url);
  }

  function importJSON(e){
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const p=JSON.parse(ev.target.result);
        if(!p.users||!p.records)throw new Error();
        setData(p);setImportMsg("✓ Данные загружены!");
      }catch{setImportMsg("✗ Неверный файл.");}
      setTimeout(()=>setImportMsg(""),4000);
    };
    reader.readAsText(file);e.target.value="";
  }

  function getChartData(){
    const now=new Date();let from=new Date(now);
    if(chartRange==="week")from.setDate(now.getDate()-7);
    else if(chartRange==="month")from.setMonth(now.getMonth()-1);
    else if(chartRange==="3months")from.setMonth(now.getMonth()-3);
    else from.setFullYear(now.getFullYear()-1);
    return userRecords.filter(r=>new Date(r.date)>=from);
  }
  const chartData=getChartData();

  async function runAI(){
    if(!apiKey){setAiResult("⚙️ Сначала введите API ключ на вкладке ⚙️");return;}
    if(userRecords.length<2){setAiResult("Добавьте хотя бы 2–3 измерения.");return;}
    setAiLoading(true);setAiResult("");
    const last30=userRecords.slice(-30);
    const avgSys=Math.round(last30.reduce((s,r)=>s+r.sys,0)/last30.length);
    const avgDia=Math.round(last30.reduce((s,r)=>s+r.dia,0)/last30.length);
    const maxSys=Math.max(...last30.map(r=>r.sys));
    const minSys=Math.min(...last30.map(r=>r.sys));
    const totalCigs=last30.reduce((s,r)=>s+r.cigarettes,0);
    const totalAlc=last30.reduce((s,r)=>s+r.alcohol,0).toFixed(1);
    const highStress=last30.filter(r=>r.stress>=7).length;
    const medsDays=last30.filter(r=>r.meds).length;
    const medsNames=[...new Set(last30.filter(r=>r.medsName).map(r=>r.medsName))].join(", ");
    const byTime={};
    TIME_OF_DAY.forEach(t=>{
      const recs=last30.filter(r=>r.timeOfDay===t.id);
      if(recs.length)byTime[t.label]=Math.round(recs.reduce((s,r)=>s+r.sys,0)/recs.length);
    });
    const prompt=`Ты — медицинский консультант по давлению. Данные за последние 30 измерений:
- Среднее: ${avgSys}/${avgDia}, макс/мин систол.: ${maxSys}/${minSys}
- По времени суток: ${JSON.stringify(byTime)}
- Сигарет: ${totalCigs}, алкоголь (дозы): ${totalAlc}
- Высокий стресс (≥7): ${highStress} из ${last30.length}
- Лекарства: ${medsDays} дней${medsNames?", препараты: "+medsNames:""}
Ответь на русском по пунктам:
1. **Общая оценка**
2. **Что беспокоит**
3. **Влияние факторов**
4. **Рекомендации** (5-7 советов)
5. **Когда к врачу**
Не ставь диагноз, будь конкретным.`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},

      const json=await res.json();
      setAiResult(json.content?.map(b=>b.text||"").join("")||"Ошибка.");
    }catch(e){setAiResult("Ошибка: "+e.message);}
    setAiLoading(false);
  }

      return h("p",{key:i,dangerouslySetInnerHTML:{__html:html},style:{margin:"3px 0",fontSize:13,lineHeight:1.6}});

  const latestRec=userRecords[userRecords.length-1];
  const zone=latestRec?getZone(latestRec.sys,latestRec.dia):null;

              h("div",{style:{fontSize:22}},t.icon),
              h("div",{style:{fontSize:11,color:"#64748b"}},t.label),
              h("div",{style:{fontWeight:700,fontSize:13,color:getColor(avg,avgD)}},avg+"/"+avgD),
            );
          })),

        h("div",{style:C.sT},"История ("+userRecords.length+" записей)"),

        ...[...userRecords].reverse().map(r=>{

        h("div",{style:C.aiStats},
          h("div",{style:C.aiStat},h("span",{style:C.aiNum},userRecords.length),h("span",{style:C.aiLbl},"измерений")),

            h("div",{style:{fontSize:12,color:"#475569"}},t),
          )),

    // User modal
    showUserModal&&h("div",{style:C.overlay},
      h("div",{style:C.modal},
        h("div",{style:C.sT},"Добавить пользователя"),
        h("input",{style:C.inp,placeholder:"Имя (напр.: Мама)",value:newUserName,onChange:e=>setNewUserName(e.target.value),onKeyDown:e=>e.key==="Enter"&&addUser()}),
        h("div",{style:C.mBtns},

  );
